<!DOCTYPE html>
<html>
<head>
    <title>careerzen Optimizer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 250px;
            padding: 16px;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 18px;
            color: #1e40af;
        }
        p {
            font-size: 13px;
            line-height: 1.4;
            color: #475569;
            margin-bottom: 16px;
        }
        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
        .footer {
            margin-top: 16px;
            font-size: 11px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <h2>careerzen</h2>
    <p>Go to any LinkedIn Job posting and click the <b>"Score with careerzen"</b> button to instantly analyze it against your resume.</p>
    <button class="btn" id="open-app-btn">Open careerzen Web App</button>
    <div class="footer">v1.0</div>
    <script src="popup.js"></script>
</body>
</html>
